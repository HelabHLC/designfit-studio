name: Production Smoke Simulation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulate-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV: production-simulation
      APP_VERSION: ${{ github.sha }}
      DESIGNFIT_DOMAIN: http://localhost
      COMPOSE_PROJECT_NAME: designfit-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build production image
        run: docker compose build --pull designfit

      - name: Start simulated production stack
        run: docker compose up -d --wait --wait-timeout 180

      - name: Verify internal health contract
        run: |
          docker compose exec -T designfit sh -c "wget -qO /tmp/health.json http://127.0.0.1:3000/api/health"
          docker compose exec -T designfit sh -c "grep -q '\"status\":\"ok\"' /tmp/health.json"
          docker compose exec -T designfit sh -c "grep -q '\"environment\":\"production-simulation\"' /tmp/health.json"

      - name: Verify reverse proxy and public surface
        run: |
          curl --fail --silent --show-error --retry 10 --retry-delay 2 http://127.0.0.1/api/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          curl --fail --silent --show-error --retry 10 --retry-delay 2 http://127.0.0.1/ > /tmp/home.html
          test -s /tmp/home.html
          grep -q 'ARBE' /tmp/home.html

      - name: Verify security headers
        run: |
          curl --fail --silent --show-error --head http://127.0.0.1/ > /tmp/headers.txt
          cat /tmp/headers.txt
          grep -qi '^X-Content-Type-Options: nosniff' /tmp/headers.txt
          grep -qi '^X-Frame-Options: DENY' /tmp/headers.txt
          grep -qi '^Referrer-Policy: strict-origin-when-cross-origin' /tmp/headers.txt

      - name: Capture runtime state
        if: always()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=200 || true

      - name: Stop simulated production stack
        if: always()
        run: docker compose down --volumes --remove-orphans
